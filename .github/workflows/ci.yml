name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [users-service, catalogue-service, orders-service, fruit-assistant-service, gateway]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint with ruff
        working-directory: services/${{ matrix.service }}
        run: ruff check app

      - name: Type-check with mypy (non-blocking)
        working-directory: services/${{ matrix.service }}
        run: mypy app --ignore-missing-imports || true

  lint-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package.json

      - name: Install dependencies
        working-directory: ui
        run: npm install

      - name: Type-check
        working-directory: ui
        run: npx tsc -b

      - name: Lint
        working-directory: ui
        run: npm run lint

  e2e:
    runs-on: ubuntu-latest
    needs: [lint-python-services, lint-ui]
    steps:
      - uses: actions/checkout@v4

      - name: Build and start the stack
        run: docker compose up -d --build
        env:
          JWT_SECRET_KEY: ci-test-secret
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Wait for gateway to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health; then
              echo "Gateway is up"
              exit 0
            fi
            echo "Waiting for gateway... ($i/30)"
            sleep 5
          done
          echo "Gateway did not become healthy in time"
          docker compose logs
          exit 1

      - name: Seed the catalogue
        run: docker compose exec -T catalogue-service python -m app.seed

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm install

      - name: Install Playwright browsers
        working-directory: ui
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e tests
        working-directory: ui
        env:
          UI_BASE_URL: http://localhost:4173
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 7

      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down the stack
        if: always()
        run: docker compose down -v
